name: Build & Release

on:
  push:
    tags: ['*']
  workflow_dispatch:

permissions:
  contents: write

env:
  UPDATER_KEY: ${{ secrets.UPDATER_SIGNING_PRIVATE_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            updater_target: windows
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            updater_target: linux
          - platform: macos-latest
            target: aarch64-apple-darwin
            updater_target: macos

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATER_KEY: ${{ secrets.UPDATER_SIGNING_PRIVATE_KEY }}
        with:
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}

      - name: Get version
        id: version
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Generate updater signature
        if: env.UPDATER_KEY != ''
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # Generate signing key from secret
          echo "$UPDATER_KEY" > private.pem
          openssl rsa -in private.pem -pubout -out public.pem 2>/dev/null

          # Find the installer (Tauri v2 paths with target)
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            ARTIFACT_PATH=$(find "$BUNDLE_DIR" -type f \( -name "*.exe" -o -name "*.msi" \) | head -1)
          elif [ "${{ matrix.platform }}" == "ubuntu-22.04" ]; then
            ARTIFACT_PATH=$(find "$BUNDLE_DIR" -type f \( -name "*.deb" -o -name "*.AppImage" \) | head -1)
          else
            ARTIFACT_PATH=$(find "$BUNDLE_DIR" -type f -name "*.dmg" | head -1)
          fi

          if [ -z "$ARTIFACT_PATH" ]; then
            echo "Error: Could not find artifact in $BUNDLE_DIR"
            ls -R "$BUNDLE_DIR"
            exit 1
          fi

          ARTIFACT_NAME=$(basename "$ARTIFACT_PATH")
          echo "Processing artifact: $ARTIFACT_NAME"

          # Calculate hash (use -r for consistent format: <hash> <file>)
          HASH=$(openssl dgst -sha256 -r "$ARTIFACT_PATH" | awk '{print $1}')

          # Sign artifact (We only need the signature of the artifact for Tauri v2)
          openssl dgst -sha256 -sign private.pem -out artifact.sig "$ARTIFACT_PATH"
          rm private.pem

          # Create a platform-specific update fragment for Tauri v2
          # Mapping matrix targets to Tauri v2 platform keys
          if [ "${{ matrix.target }}" == "aarch64-apple-darwin" ]; then PLATFORM="darwin-aarch64";
          elif [ "${{ matrix.target }}" == "x86_64-apple-darwin" ]; then PLATFORM="darwin-x86_64";
          elif [ "${{ matrix.target }}" == "x86_64-pc-windows-msvc" ]; then PLATFORM="windows-x86_64";
          elif [ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]; then PLATFORM="linux-x86_64";
          else PLATFORM="${{ matrix.target }}"; fi

          SIG=$(base64 < artifact.sig | tr -d '\n')
          cat > fragment.json << EOF
          {
            "$PLATFORM": {
              "signature": "$SIG",
              "url": "https://github.com/Jianzhe228/tracker/releases/download/v$VERSION/$ARTIFACT_NAME"
            }
          }
          EOF

          echo "artifact_path=$ARTIFACT_PATH" > artifact_path.txt
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload update fragments
        if: env.UPDATER_KEY != ''
        uses: actions/upload-artifact@v4
        with:
          name: fragment-${{ matrix.updater_target }}
          path: fragment.json

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-installer'
          path: artifacts

      - name: Download update fragments
        uses: actions/download-artifact@v4
        with:
          path: fragments
          pattern: 'fragment-*'

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release-assets

          # download-artifact keeps nested directories for multi-path uploads,
          # so collect installer files recursively instead of copying only the top level.
          find artifacts -type f \( \
            -name "*.exe" -o \
            -name "*.msi" -o \
            -name "*.deb" -o \
            -name "*.AppImage" -o \
            -name "*.dmg" \
          \) -exec cp {} release-assets/ \;

          # Aggregate all fragments into one platforms object
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "Building update.json for version $VERSION"
          
          # Initialize combined platforms object
          PLATFORMS_OBJ="{}"
          for f in fragments/fragment-*/fragment.json; do
            if [ -f "$f" ]; then
              echo "Merging $f"
              # Use python to safely merge json if jq is not guaranteed, but ubuntu-latest has jq
              PLATFORMS_OBJ=$(jq -s '.[0] * .[1]' <(echo "$PLATFORMS_OBJ") "$f")
            fi
          done

          # Create final update.json
          cat > release-assets/latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "Release $TAG",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": $PLATFORMS_OBJ
          }
          EOF

          # Support legacy update.json name if needed, but latest.json is better for v2
          cp release-assets/latest.json release-assets/update.json

          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.deb
            release-assets/**/*.AppImage
            release-assets/**/*.dmg
            release-assets/**/update.json
            release-assets/**/update.json.sig
