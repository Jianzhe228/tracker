name: Build & Release

on:
  push:
    tags: ['*']
  workflow_dispatch:

permissions:
  contents: write

env:
  UPDATER_KEY: ${{ secrets.UPDATER_SIGNING_PRIVATE_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            updater_target: windows
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            updater_target: linux
          - platform: macos-latest
            target: aarch64-apple-darwin
            updater_target: macos

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATER_KEY: ${{ secrets.UPDATER_SIGNING_PRIVATE_KEY }}
        with:
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}

      - name: Get version
        id: version
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg

      - name: Generate updater signature
        if: env.UPDATER_KEY != ''
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # Generate signing key from secret
          echo "$UPDATER_KEY" > private.pem
          openssl rsa -in private.pem -pubout -out public.pem 2>/dev/null

          # Find the installer (Tauri v2 paths)
          BUNDLE_DIR="src-tauri/target/release/bundle"
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            ARTIFACT_PATH=$(find "$BUNDLE_DIR" -type f \( -name "*.exe" -o -name "*.msi" \) | head -1)
          elif [ "${{ matrix.platform }}" == "ubuntu-22.04" ]; then
            ARTIFACT_PATH=$(find "$BUNDLE_DIR" -type f \( -name "*.deb" -o -name "*.AppImage" \) | head -1)
          else
            ARTIFACT_PATH=$(find "$BUNDLE_DIR" -type f -name "*.dmg" | head -1)
          fi

          if [ -z "$ARTIFACT_PATH" ]; then
            echo "Error: Could not find artifact in $BUNDLE_DIR"
            ls -R "$BUNDLE_DIR"
            exit 1
          fi

          ARTIFACT_NAME=$(basename "$ARTIFACT_PATH")
          echo "Processing artifact: $ARTIFACT_NAME"

          # Calculate hash (use -r for consistent format: <hash> <file>)
          HASH=$(openssl dgst -sha256 -r "$ARTIFACT_PATH" | awk '{print $1}')

          # Create update.json
          cat > update.json << EOF
          {
            "version": "$VERSION",
            "notes": "New release",
            "path": "$ARTIFACT_NAME",
            "sha256": "$HASH",
            "windows": { "installer": "$ARTIFACT_NAME" },
            "linux": { "installer": "$ARTIFACT_NAME" },
            "macOS": { "installer": "$ARTIFACT_NAME" }
          }
          EOF

          # Sign update.json
          openssl dgst -sha256 -sign private.pem -out update.json.sig update.json
          rm private.pem

          # Base64 encode for artifact
          base64 < update.json > update.json.b64
          base64 < update.json.sig > update.json.sig.b64

          echo "artifact_path=$ARTIFACT_PATH" > artifact_path.txt
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload update artifacts
        if: env.UPDATER_KEY != ''
        uses: actions/upload-artifact@v4
        with:
          name: update-${{ matrix.updater_target }}
          path: |
            update.json.b64
            update.json.sig.b64
            artifact_path.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-installer'
          path: artifacts

      - name: Download update artifacts
        uses: actions/download-artifact@v4
        with:
          path: updates

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release-assets
          cp artifacts/windows-installer/* release-assets/ 2>/dev/null || true
          cp artifacts/linux-installer/* release-assets/ 2>/dev/null || true
          cp artifacts/macos-installer/* release-assets/ 2>/dev/null || true

          # Copy update.json files for each platform
          for target in windows linux macos; do
            if [ -f "updates/update-${target}/update.json.b64" ]; then
              mkdir -p "release-assets/${target}"
              base64 -d < "updates/update-${target}/update.json.b64" > "release-assets/${target}/update.json"
              base64 -d < "updates/update-${target}/update.json.sig.b64" > "release-assets/${target}/update.json.sig"
            fi
          done

          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.deb
            release-assets/**/*.AppImage
            release-assets/**/*.dmg
            release-assets/**/update.json
            release-assets/**/update.json.sig
